version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: question-db
    environment:
      POSTGRES_DB: question_db
      POSTGRES_USER: question_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-question_pass}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U question_user -d question_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: question-backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: question_user
      DB_PASSWORD: ${DB_PASSWORD:-question_pass}
      DB_NAME: question_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: question-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  pgadmin:
    image: dpage/pgadmin4
    container_name: question-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  pgdata:
